<style>

  .card{background:linear-gradient(135deg,#252220 0%,#2D2A27 60%,#252220 100%);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:48px 40px;box-shadow:0 24px 80px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.03) inset;}

  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,112,35,.15)}50%{box-shadow:0 0 0 14px rgba(255,112,35,0)}}
  .badge{display:inline-block;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#FF7023;background:rgba(255,112,35,.12);border:1px solid rgba(255,112,35,.25);border-radius:20px;padding:4px 14px;margin-bottom:20px;}
  h1{font-family:'DM Serif Display',serif;font-size:28px;font-weight:400;letter-spacing:-.3px;line-height:1.3;margin-bottom:8px;}
  h1 em{font-style:italic;color:#C5E4CC;}
  .subtitle{font-size:14px;color:#9a9088;line-height:1.6;margin-bottom:32px;}
  .btn{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,#FF7023,#e0601a);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;letter-spacing:.02em;border:none;border-radius:12px;padding:14px 32px;cursor:pointer;text-decoration:none;transition:all .2s;box-shadow:0 4px 20px rgba(255,112,35,.3);}
  .btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,112,35,.45);}
  .btn:active{transform:translateY(0);}
  .btn svg{flex-shrink:0;}
  .vpn-notice{margin-top:28px;background:rgba(143,165,150,.08);border:1px solid rgba(143,165,150,.18);border-radius:12px;padding:16px 20px;display:flex;align-items:flex-start;gap:12px;text-align:left;}
  .vpn-icon{width:36px;height:36px;border-radius:8px;background:rgba(143,165,150,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
  .vpn-text{font-size:13px;color:#8FA596;line-height:1.5;}
  .vpn-text strong{color:#C5E4CC;font-weight:600;}
  .footer{margin-top:32px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#5a534d;}
  @media(max-width:540px){.card{padding:36px 24px;margin:16px;border-radius:16px;} h1{font-size:24px;} .btn{width:100%;justify-content:center;}}
</style>

</div>

</html>
